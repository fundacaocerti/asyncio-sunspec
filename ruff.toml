# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black.
line-length = 88
indent-width = 4

# Assume Python 3.12
target-version = "py312"

[lint]
select = [
    "RUF",   # Ruff specific rules
    "FAST",  # Fast API rules
    "ANN",   # Flake8 Annotations
    "ASYNC", # Flake8 Asyncio Rules
    "S",     # Flake8 Bandit
    "FBT",   # Flake8 Boolean Trap
    "A",     # Flake8 Builtins
    "C4",    # Flake8 Comprehension
    "LOG",   # Flake8 Logging
    "PTH",   # Flake8 Pathlib
    "SLF",   # Flake8 Self
    "SIM",   # Flake8 Simplify
    "I",     # isort
    "N",     # PEP8 Naming
    "E",     # PyCodeStyles
    "W",     # PyCodeStyles
    "D",     # pydocstyle
    "F",     # pyflakes
    "UP",    # pyupgrade
]
ignore = [
    "D203", 
    "D212",
    "N805",  # Ignore "self" as first argument for abstractmethods
    "ANN002",
    "ANN003",
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"tests/*" = [ # Test related ignore list
    "ANN", # Ignore annotation rules for tests
    "S",   # Ignore security for testing code
    "SLF", # Ignore private member access
]

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"
